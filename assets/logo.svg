<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 320" role="img" aria-label="Driftline Learning Design">
<title>Driftline Learning Design</title>

<defs>
<linearGradient id="fadeLine" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#F5A23A" stop-opacity="0"/>
  <stop offset="12%" stop-color="#F5A23A" stop-opacity="1"/>
  <stop offset="88%" stop-color="#F5A23A" stop-opacity="1"/>
  <stop offset="100%" stop-color="#F5A23A" stop-opacity="0"/>
</linearGradient>
</defs>

<style>
.wordmark {
  font-family: "Sora", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  font-weight: 500;
  font-size: 150px;
  letter-spacing: 18px;
  fill: #1F2A3A;
}

.subline {
  font-family: "Sora", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  font-weight: 400;
  font-size: 64px;
  letter-spacing: 14px;
  fill: #1F2A3A;
  opacity: .9;
}

.drift {
  fill: none;
  stroke-width: 8;
  stroke-linecap: round;
  stroke-linejoin: round;
}
</style>

<text class="wordmark" x="700" y="140" text-anchor="middle">
DRIFTLINE
</text>

<path class="drift" stroke="url(#fadeLine)"
      d="M280 195
         C373 170 467 170 560 195
         C653 220 747 220 840 195
         C933 170 1027 170 1120 195"/>

<text class="subline" x="700" y="285" text-anchor="middle">
LEARNING DESIGN
</text>

</svg>
